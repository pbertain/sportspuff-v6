<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour de France - Sportspuff v6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>
<body style="--event-accent: #F5E814;" data-sport-theme="cycling">
    {% include 'shared_header.html' %}

    <div class="container event-league-shell my-4">
        <div class="event-league-hero mb-4">
            <div class="d-flex flex-wrap align-items-center gap-3">
                <img class="event-league-logo" src="https://www.splitsp.lat/logos/cycling/tdf/tdf_logo.png" alt="Tour de France logo" onerror="this.style.display='none';">
                <img class="tdf-hero-mark" src="{{ url_for('static', filename='images/events/cycling/tour-de-france-mark.svg') }}" alt="Tour de France mark">
                <div class="flex-grow-1">
                    <h1 class="mb-1">Tour de France</h1>
                    <div class="event-league-meta">Detailed stage coverage, classifications, teams, and riders.</div>
                    <div id="tdf-freshness" class="event-data-freshness" style="display: none;"></div>
                </div>
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <a class="btn btn-outline-light" href="{{ url_for('league_page', league_name='CYCLING') }}">Back to Cycling</a>
                    <span class="event-league-pill" id="tdf-year-pill">{{ year }}</span>
                </div>
            </div>
        </div>

        <div id="tdf-summary-panel" class="event-league-card mb-3">
            <div class="text-center py-4">
                <div class="spinner-border text-light" role="status"><span class="visually-hidden">Loading...</span></div>
                <div class="event-league-meta mt-2">Loading Tour de France...</div>
            </div>
        </div>
        <div id="tdf-boards-panel" class="tdf-board-grid mb-3"></div>
        <div id="tdf-stages-panel" class="tdf-stage-grid"></div>
    </div>

    {% include 'shared_footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const TOUR_YEAR = {{ year | tojson }};
        let TOUR_RIDER_LOOKUP = { bySlug: new Map(), byShortName: new Map() };

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function firstValue(...values) {
            return values.find(value => value !== undefined && value !== null && String(value).trim() !== '');
        }

        function prettyDate(value) {
            if (!value) return '';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return String(value);
            return parsed.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function prettyDateTime(value) {
            if (!value) return '';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return String(value);
            return parsed.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
        }

        function toProperCase(value) {
            return String(value ?? '')
                .toLowerCase()
                .split(/(\s+|-|')/)
                .map(part => /^[\s-']+$/.test(part) ? part : part.charAt(0).toUpperCase() + part.slice(1))
                .join('');
        }

        function slugToFullName(slug) {
            if (!slug) return '';
            return String(slug)
                .split('/')
                .pop()
                .split('-')
                .filter(Boolean)
                .map(toProperCase)
                .join(' ');
        }

        function cleanRiderKey(name) {
            return String(name ?? '')
                .split('|')[0]
                .replace(/#\d+/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function buildRiderLookup(data) {
            const bySlug = new Map();
            const byShortName = new Map();
            const riders = Array.isArray(data?.riders) ? data.riders : [];

            riders.forEach(rider => {
                const shortName = cleanRiderKey(firstValue(rider.rider_name, rider.short_name, ''));
                const slug = firstValue(rider.rider_slug, '');
                const fullName = firstValue(
                    rider.full_name,
                    rider.rider_full_name,
                    slugToFullName(slug),
                    toProperCase(shortName)
                );

                if (slug) bySlug.set(slug, fullName);
                if (shortName) byShortName.set(shortName.toUpperCase(), fullName);
            });

            TOUR_RIDER_LOOKUP = { bySlug, byShortName };
        }

        function freshnessText(payload) {
            const meta = payload?.meta || {};
            const bits = [
                meta.source_updated_at ? `Source ${prettyDateTime(meta.source_updated_at)}` : '',
                payload?.generated_at ? `Bundle ${prettyDateTime(payload.generated_at)}` : '',
            ].filter(Boolean);
            return bits.join(' • ');
        }

        function normalizedGap(value) {
            const raw = String(value ?? '').trim();
            if (!raw) return '';
            if (raw === '-' || raw === '0' || raw === '+0' || raw === '00:00' || raw === '00:00:00') return '';
            return raw.startsWith('+') ? raw : `+${raw}`;
        }

        function boardValueLabel(boardType) {
            if (boardType === 'points' || boardType === 'kom') return 'Points';
            return 'Time';
        }

        function classificationValue(row, boardType, index) {
            if (boardType === 'points' || boardType === 'kom') {
                return firstValue(normalizedGap(row.gap), row.points, row.value, '');
            }

            if (index === 0) {
                return firstValue(row.time, row.total_time, row.elapsed_time, normalizedGap(row.gap), '');
            }

            return firstValue(
                normalizedGap(row.gap),
                normalizedGap(row.time_back),
                normalizedGap(row.behind),
                row.time,
                row.total_time,
                ''
            );
        }

        function classificationName(row) {
            const slug = firstValue(row.rider_slug, row.slug, '');
            if (slug && TOUR_RIDER_LOOKUP.bySlug.has(slug)) {
                return TOUR_RIDER_LOOKUP.bySlug.get(slug);
            }

            const riderName = cleanRiderKey(firstValue(row.rider_full_name, row.full_name, row.rider_name, ''));
            if (riderName && TOUR_RIDER_LOOKUP.byShortName.has(riderName.toUpperCase())) {
                return TOUR_RIDER_LOOKUP.byShortName.get(riderName.toUpperCase());
            }

            return riderName ? toProperCase(riderName) : firstValue(row.team_name, 'TBD');
        }

        function classificationMeta(row, boardType) {
            if (boardType === 'teams') return '';
            return firstValue(row.team_name, '');
        }

        function renderBoard(title, boardType, rows) {
            const safeRows = Array.isArray(rows) ? rows.slice(0, 10) : [];
            if (safeRows.length === 0) return '';
            const tableRows = safeRows.map((row, index) => `
                <tr>
                    <td>${escapeHtml(row.rank ?? '')}</td>
                    <td>
                        <div class="tdf-board-name">${escapeHtml(classificationName(row))}</div>
                        ${classificationMeta(row, boardType) ? `<div class="tdf-board-meta">${escapeHtml(classificationMeta(row, boardType))}</div>` : ''}
                    </td>
                    <td>${escapeHtml(classificationValue(row, boardType, index))}</td>
                </tr>
            `).join('');
            return `
                <section class="event-league-card tdf-board-card">
                    <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                        <h2 class="event-league-title fs-5 mb-0">${escapeHtml(title)}</h2>
                        <span class="event-league-pill">${safeRows.length}</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-sm table-dark align-middle mb-0 tdf-board-table">
                            <thead>
                                <tr><th>#</th><th>${boardType === 'teams' ? 'Team' : 'Rider'}</th><th>${boardValueLabel(boardType)}</th></tr>
                            </thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                    </div>
                </section>
            `;
        }

        function renderCurrentStage(currentStage) {
            const stage = currentStage?.stage || {};
            const schedule = currentStage?.schedule || {};
            const stageNumber = firstValue(stage.stage_number, schedule.stage_number, '');
            const title = firstValue(stage.stage_name, schedule.stage_name, stage.cycling_event_label, 'Current Stage');
            const route = [stage.start_city, stage.finish_city].filter(Boolean).join(' to ');
            const status = firstValue(stage.status, schedule.poll_state, '');
            const meta = [
                stage.date ? prettyDate(stage.date) : '',
                route,
                stage.distance_km ? `${stage.distance_km} km` : '',
                status,
            ].filter(Boolean).join(' • ');
            const links = [
                stage.cycling_url ? `<a class="btn btn-sm btn-outline-light" href="${stage.cycling_url}" target="_blank" rel="noopener noreferrer">Stage Page</a>` : '',
                stage.rankings_url ? `<a class="btn btn-sm btn-outline-light" href="${stage.rankings_url}" target="_blank" rel="noopener noreferrer">Rankings</a>` : '',
            ].filter(Boolean).join('');
            return `
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                    <div>
                        <div class="tdf-kicker">Current Stage</div>
                        <h2 class="event-league-title mb-1">${escapeHtml(stageNumber ? `Stage ${stageNumber}: ${title}` : title)}</h2>
                        <div class="event-league-meta">${escapeHtml(meta)}</div>
                        ${stage.winner ? `<div class="event-league-meta mt-2">Winner: ${escapeHtml(stage.winner)}</div>` : ''}
                        ${schedule.recommended_poll_minutes ? `<div class="event-league-meta mt-1">Recommended refresh: every ${escapeHtml(schedule.recommended_poll_minutes)} minutes</div>` : ''}
                    </div>
                    <div class="d-flex gap-2 flex-wrap">${links}</div>
                </div>
            `;
        }

        function renderStageCard(stageDetail) {
            const stage = stageDetail?.stage || {};
            const schedule = stageDetail?.schedule || {};
            const stageNumber = firstValue(stage.stage_number, schedule.stage_number, '');
            const title = firstValue(stage.stage_name, schedule.stage_name, stage.cycling_event_label, 'Stage');
            const route = [stage.start_city, stage.finish_city].filter(Boolean).join(' to ');
            const meta = [
                stage.date ? prettyDate(stage.date) : '',
                route,
                stage.distance_km ? `${stage.distance_km} km` : '',
                firstValue(stage.status, schedule.poll_state, ''),
            ].filter(Boolean).join(' • ');
            const winner = firstValue(stage.winner, '');
            return `
                <article class="event-league-card tdf-stage-card">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <div>
                            <div class="tdf-kicker">${escapeHtml(stageNumber ? `Stage ${stageNumber}` : 'Stage')}</div>
                            <h3 class="event-league-title fs-5 mb-1">${escapeHtml(title)}</h3>
                            <div class="event-league-meta">${escapeHtml(meta)}</div>
                            ${winner ? `<div class="event-league-meta mt-2">Winner: ${escapeHtml(winner)}</div>` : ''}
                        </div>
                    </div>
                </article>
            `;
        }

        async function loadTour() {
            const summary = document.getElementById('tdf-summary-panel');
            const boards = document.getElementById('tdf-boards-panel');
            const stages = document.getElementById('tdf-stages-panel');
            const freshness = document.getElementById('tdf-freshness');

            try {
                const response = await fetch(`/api/proxy/cycling/tour-de-france/${encodeURIComponent(TOUR_YEAR)}`);
                const data = response.ok ? await response.json() : {};
                buildRiderLookup(data);
                const freshnessLabel = freshnessText(data);
                if (freshnessLabel) {
                    freshness.textContent = `Updated: ${freshnessLabel}`;
                    freshness.style.display = '';
                }

                summary.innerHTML = data?.current_stage
                    ? renderCurrentStage(data.current_stage)
                    : `<div class="event-league-meta">No current Tour de France stage is available for ${escapeHtml(TOUR_YEAR)}.</div>`;

                const latest = data?.latest_classifications || {};
                boards.innerHTML = [
                    renderBoard('General Classification', 'gc', latest.gc),
                    renderBoard('Points', 'points', latest.points),
                    renderBoard('King of the Mountains (KOM)', 'kom', latest.kom),
                    renderBoard('Youth', 'youth', latest.youth),
                    renderBoard('Teams', 'teams', latest.teams),
                ].filter(Boolean).join('');

                const stageCards = Array.isArray(data?.stages) ? data.stages.map(renderStageCard).join('') : '';
                stages.innerHTML = stageCards || `<div class="event-league-card"><div class="event-league-meta">No stage data is available yet.</div></div>`;
            } catch (error) {
                summary.innerHTML = `<div class="alert alert-warning mb-0">Unable to load Tour de France: ${escapeHtml(error.message || error)}</div>`;
                boards.innerHTML = '';
                stages.innerHTML = '';
            }
        }

        document.addEventListener('DOMContentLoaded', loadTour);
    </script>
</body>
</html>
