<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ league_config.display_name }} - Sportspuff v6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>
<body style="--event-accent: {{ league_config.accent }};">
    {% include 'shared_header.html' %}

    <div class="container event-league-shell my-4">
        <div class="event-league-hero mb-4">
            <div class="d-flex flex-wrap align-items-center gap-3">
                <img class="event-league-logo" src="{{ league_config.logo_url }}" alt="{{ league_config.display_name }} logo" onerror="this.style.display='none';">
                <div class="flex-grow-1">
                    <h1 class="mb-1">{{ league_config.display_name }}</h1>
                    <div class="event-league-meta">{{ league_config.subtitle }}</div>
                </div>
                <div class="d-flex flex-wrap gap-2 align-items-end">
                    <div>
                        <label for="event-date-picker" class="form-label text-white fw-bold mb-1">Date</label>
                        <div class="input-group">
                            <input type="text" id="event-date-picker" class="form-control" readonly>
                            <button id="event-today-btn" class="btn btn-outline-light" type="button">Today</button>
                        </div>
                    </div>
                    <div>
                        <label for="event-timezone-select" class="form-label text-white fw-bold mb-1">Timezone</label>
                        <select id="event-timezone-select" class="form-select">
                            <option value="pt" selected>Pacific Time</option>
                            <option value="et">Eastern Time</option>
                            <option value="ct">Central Time</option>
                            <option value="mt">Mountain Time</option>
                            <option value="Europe/London">London</option>
                            <option value="Europe/Paris">Paris</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="event-season-panel" class="event-league-card mb-3" style="display: none;"></div>
        <div id="event-league-results" class="event-league-card">
            <div class="text-center py-4">
                <div class="spinner-border text-light" role="status"><span class="visually-hidden">Loading...</span></div>
                <div class="event-league-meta mt-2">Loading {{ league_config.display_name }}...</div>
            </div>
        </div>
    </div>

    {% include 'shared_footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        const EVENT_LEAGUE = {{ league_name | tojson }};
        const EVENT_MODE = {{ league_config.mode | tojson }};

        function prettyDate(value) {
            if (!value) return '';
            return new Date(value + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function statusText(game) {
            const status = (game.game_status || '').toLowerCase();
            if (game.is_final || ['final', 'completed', 'finished', 'off'].includes(status)) return 'Final';
            if (['in_progress', 'live', 'active'].includes(status)) return 'Live';
            if (game.game_time) {
                const d = new Date(game.game_time);
                if (!Number.isNaN(d.getTime())) {
                    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
                }
            }
            return game.game_status || 'Scheduled';
        }

        function firstValue(...values) {
            return values.find(value => value !== undefined && value !== null && String(value).trim() !== '');
        }

        function tournamentName(game) {
            return firstValue(
                game.tennis_tournament,
                game.tournament_name,
                game.tournament,
                game.event_name,
                game.competition_name,
                game.league_name
            );
        }

        function tennisPlayerName(game, side) {
            const name = side === 'home'
                ? firstValue(game.home_player, game.player1, game.player_1, game.player_one, game.home_competitor, game.home_team, game.strHomeTeam)
                : firstValue(game.visitor_player, game.away_player, game.player2, game.player_2, game.player_two, game.away_competitor, game.visitor_team, game.away_team, game.strAwayTeam);
            if (!name) return 'TBD';
            const clean = String(name).replace(/\s+/g, ' ').trim();
            const parts = clean.split(' ');
            return parts.length > 1 ? parts[parts.length - 1] : clean;
        }

        function scoreText(game) {
            if (EVENT_MODE === 'cycling') return statusText(game);
            const hasScore = game.home_score !== undefined && game.visitor_score !== undefined
                && (game.is_final || Number(game.home_score) > 0 || Number(game.visitor_score) > 0);
            if (EVENT_MODE === 'tennis') return (game.is_final || (game.game_status || '').toLowerCase() === 'final') ? 'Final' : 'vs';
            return hasScore ? `${game.visitor_score} - ${game.home_score}` : 'vs';
        }

        function detailLine(game) {
            if (EVENT_MODE === 'tennis') {
                return game.tennis_round || game.round ? `R${game.tennis_round || game.round}` : '';
            }
            if (EVENT_MODE === 'cycling') {
                return [game.cycling_race || game.home_team, game.cycling_stage_label || game.visitor_team, game.cycling_country].filter(Boolean).join(' · ');
            }
            if (EVENT_MODE === 'world-cup') {
                const round = (game.wc_round_label || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                return [round, game.venue_name || game.stadium_name].filter(Boolean).join(' · ');
            }
            return '';
        }

        function renderGame(game) {
            if (EVENT_MODE === 'cycling') {
                const title = game.cycling_event_label || detailLine(game) || game.home_team || 'Cycling event';
                const details = detailLine(game);
                return `<div class="event-league-card">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                        <div>
                            <h3 class="event-league-title fs-5">${escapeHtml(title)}</h3>
                            <div class="event-league-meta">${escapeHtml(details)}</div>
                        </div>
                        <div class="event-league-score">${escapeHtml(statusText(game))}</div>
                    </div>
                </div>`;
            }

            const details = detailLine(game);
            const visitorName = EVENT_MODE === 'tennis' ? tennisPlayerName(game, 'visitor') : (game.visitor_team || 'TBD');
            const homeName = EVENT_MODE === 'tennis' ? tennisPlayerName(game, 'home') : (game.home_team || 'TBD');
            const sideLabel = EVENT_MODE === 'tennis' ? 'Player' : 'Team';
            return `<div class="event-league-card">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                    <div style="min-width: 180px;">
                        <h3 class="event-league-title fs-5">${escapeHtml(visitorName)}</h3>
                        <div class="event-league-meta">${escapeHtml(sideLabel)}</div>
                    </div>
                    <div class="text-center">
                        <div class="event-league-score fs-4">${escapeHtml(scoreText(game))}</div>
                        <div class="event-league-meta">${escapeHtml(statusText(game))}</div>
                    </div>
                    <div class="text-end" style="min-width: 180px;">
                        <h3 class="event-league-title fs-5">${escapeHtml(homeName)}</h3>
                        <div class="event-league-meta">${escapeHtml(sideLabel)}</div>
                    </div>
                </div>
                ${details ? `<div class="event-league-meta mt-2">${escapeHtml(details)}</div>` : ''}
            </div>`;
        }

        function renderTennisGroups(games) {
            const groups = new Map();
            games.forEach(game => {
                const name = tournamentName(game) || 'Tournament';
                if (!groups.has(name)) groups.set(name, []);
                groups.get(name).push(game);
            });
            return Array.from(groups.entries()).map(([name, matches]) => `
                <div class="event-league-tournament-group">
                    <div class="event-league-tournament-banner">
                        <div>
                            <div class="event-league-tournament-name">${escapeHtml(name)}</div>
                            <div class="event-league-meta">${matches.length} ${matches.length === 1 ? 'match' : 'matches'}</div>
                        </div>
                    </div>
                    ${matches.map(renderGame).join('')}
                </div>
            `).join('');
        }

        function renderSeasonInfo(info) {
            const panel = document.getElementById('event-season-panel');
            if (!info || !Array.isArray(info.season_types) || info.season_types.length === 0) return;
            const phase = info.current_phase || info.season_types[0].name || '';
            const dates = info.season_types
                .filter(st => st.display || st.start_date)
                .map(st => `<span class="event-league-pill">${escapeHtml(st.display || `${st.name}: ${prettyDate(st.start_date)} - ${prettyDate(st.end_date)}`)}</span>`)
                .join(' ');
            panel.innerHTML = `<div class="d-flex flex-wrap align-items-center gap-2">
                <strong>${escapeHtml(info.year || '')} ${escapeHtml(phase)}</strong>
                ${dates}
            </div>`;
            panel.style.display = '';
        }

        async function loadEventLeague() {
            const results = document.getElementById('event-league-results');
            const datePicker = document.getElementById('event-date-picker');
            const tz = document.getElementById('event-timezone-select').value;
            const today = new Date().toISOString().slice(0, 10);
            const picked = datePicker.value || today;
            const apiDate = picked === today ? 'today' : picked;
            const league = EVENT_LEAGUE.toLowerCase();

            results.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-light" role="status"><span class="visually-hidden">Loading...</span></div></div>';

            try {
                const [seasonRes, scheduleRes, scoresRes] = await Promise.all([
                    fetch(`/api/season-info/${league}`).then(r => r.ok ? r.json() : {}).catch(() => ({})),
                    fetch(`/api/proxy/schedule/${league}/${apiDate}?tz=${encodeURIComponent(tz)}`).then(r => r.ok ? r.json() : { games: [] }),
                    fetch(`/api/proxy/scores/${league}/${apiDate}?tz=${encodeURIComponent(tz)}`).then(r => r.ok ? r.json() : { scores: [] })
                ]);
                renderSeasonInfo(seasonRes);

                const byId = {};
                (scheduleRes.games || []).forEach(game => { byId[game.game_id || `${game.home_team}-${game.visitor_team}-${game.game_time}`] = game; });
                (scoresRes.scores || []).forEach(score => {
                    const key = score.game_id || `${score.home_team}-${score.visitor_team}-${score.game_time}`;
                    byId[key] = {...(byId[key] || {}), ...score};
                });
                const games = Object.values(byId).sort((a, b) => {
                    if (a.game_time && b.game_time) return new Date(a.game_time) - new Date(b.game_time);
                    if (a.game_time) return -1;
                    if (b.game_time) return 1;
                    return 0;
                });

                if (games.length === 0) {
                    const phase = seasonRes.current_phase || '';
                    const noun = EVENT_MODE === 'cycling' ? 'stages' : 'matches';
                    const prefix = phase && !['Off Season', 'Off Tour', 'Regular Season'].includes(phase) ? `${phase} — ` : '';
                    const emptyTitle = EVENT_MODE === 'world-cup'
                        ? `No matches on ${prettyDate(picked)}`
                        : `${prefix}No ${noun} on ${prettyDate(picked)}`;
                    results.innerHTML = `<div class="text-center py-4">
                        ${EVENT_MODE === 'world-cup' ? '<div class="event-soccer-ball" aria-hidden="true"><i class="fas fa-futbol"></i></div>' : ''}
                        <h2 class="fs-4 mb-1">${escapeHtml(emptyTitle)}</h2>
                        <div class="event-league-meta">${EVENT_MODE === 'world-cup' ? 'Check another match date from the date picker.' : 'Try a tournament or race date from the date picker.'}</div>
                    </div>`;
                    return;
                }

                const renderedEvents = EVENT_MODE === 'tennis' ? renderTennisGroups(games) : games.map(renderGame).join('');
                results.innerHTML = `<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                    <h2 class="fs-4 mb-0">${escapeHtml(prettyDate(picked))}</h2>
                    <span class="event-league-pill">${games.length} ${games.length === 1 ? 'event' : 'events'}</span>
                </div>${renderedEvents}`;
            } catch (error) {
                results.innerHTML = `<div class="alert alert-warning mb-0">Unable to load ${escapeHtml(EVENT_LEAGUE)}: ${escapeHtml(error.message || error)}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const fp = flatpickr(document.getElementById('event-date-picker'), {
                defaultDate: 'today',
                dateFormat: 'Y-m-d',
                allowInput: false,
                onChange: loadEventLeague
            });
            document.getElementById('event-today-btn').addEventListener('click', () => fp.setDate('today', true));
            document.getElementById('event-timezone-select').addEventListener('change', loadEventLeague);
            loadEventLeague();
        });
    </script>
</body>
</html>
