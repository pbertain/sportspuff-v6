---
# Install system dependencies
- name: Update package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system packages
  apt:
    name:
      - python3
      - python3-pip
      - python3-psycopg2
      - python3-venv
      - python3-full
      - python3-dev
      - postgresql-16
      - postgresql-contrib-16
      - git
      - nginx
      - acl
    state: present

# Create application directory
- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'

# Clone/update repository
- name: Clone repository
  git:
    repo: "https://github.com/pbertain/sportspuff-v6.git"
    dest: "{{ app_dir }}"
    version: "{{ branch }}"
    force: yes
  become_user: "{{ app_user }}"

# Create virtual environment
- name: Create virtual environment
  command: "python3 -m venv {{ app_dir }}/venv"
  args:
    creates: "{{ app_dir }}/venv"

- name: Debug virtual environment
  command: "{{ app_dir }}/venv/bin/python --version"
  register: venv_python_version
  changed_when: false

- name: Show Python version
  debug:
    msg: "Virtual environment Python version: {{ venv_python_version.stdout }}"

- name: Upgrade pip in virtual environment
  command: "{{ app_dir }}/venv/bin/pip install --upgrade pip"
  args:
    creates: "{{ app_dir }}/venv/bin/pip"

# Install Python requirements from requirements.txt (single source of truth).
# Long async timeout because pandas wheels can take a while to land on ARM.
- name: Install requirements.txt
  pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"
    virtualenv_command: "{{ app_dir }}/venv/bin/python"
    extra_args: "--timeout 300 --retries 3 --prefer-binary"
  async: 1800
  poll: 60

# Create environment file
- name: Create environment file
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0600'

# --- Postgres bootstrap (idempotent: safe to re-run on existing hosts) -------
# On a fresh host, these create the database, set the postgres password, and
# load the schema. On an existing host, every step is a no-op.
- name: Ensure postgresql service is running
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Wait for postgresql socket to become available
  wait_for:
    path: /var/run/postgresql/.s.PGSQL.5432
    state: present
    timeout: 180

- name: Wait for postgresql to accept local connections
  become: yes
  become_user: postgres
  command: pg_isready -h /var/run/postgresql -d postgres
  register: postgresql_ready
  changed_when: false
  retries: 30
  delay: 10
  until: postgresql_ready.rc == 0

- name: Set postgres user password (idempotent; (re)applies the configured value)
  become: yes
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    login_unix_socket: /var/run/postgresql
    state: present
  no_log: true

- name: Check if {{ db_name }} database exists
  become: yes
  become_user: postgres
  command: psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'"
  register: db_exists_check
  changed_when: false

- name: Create {{ db_name }} database (only when missing)
  become: yes
  become_user: postgres
  command: createdb "{{ db_name }}"
  when: db_exists_check.stdout != "1"

- name: Check whether the schema is already loaded ('teams' table presence)
  become: yes
  become_user: postgres
  command: psql -d "{{ db_name }}" -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='teams'"
  register: teams_table_check
  changed_when: false

- name: Apply schema_modular.sql (only when teams table is missing)
  shell: >
    PGPASSWORD="{{ db_password }}"
    psql -h {{ db_host }} -U {{ db_user }} -d {{ db_name }}
    -f {{ app_dir }}/database_schema_modular.sql
  when: teams_table_check.stdout != "1"

# Run database migrations (idempotent — every file uses IF NOT EXISTS guards).
# migrate_remove_mlc_placeholder.sql is intentionally NOT in this list — it's a
# one-shot data fix that would fail (its safety check) on a fresh DB where the
# placeholder never existed.
- name: Run database migrations
  shell: >
    PGPASSWORD="{{ db_password }}"
    psql -h {{ db_host }} -U {{ db_user }} -d {{ db_name }}
    -f {{ app_dir }}/{{ item }}
  loop:
    - migrate_add_team_record_columns.sql
    - migrate_add_team_abbreviation.sql
    - migrate_add_external_team_id.sql
    - migrate_stadiums_add_columns.sql
  register: migration_result
  changed_when: "'Added' in migration_result.stderr or 'CREATE' in migration_result.stderr"
  failed_when: migration_result.rc != 0

# Import data from CSV files into PostgreSQL
# Uses ON CONFLICT ... DO UPDATE so it's safe to run on every deploy
- name: Import data from CSV files
  command: "{{ app_dir }}/venv/bin/python {{ app_dir }}/import_data_modular.py"
  args:
    chdir: "{{ app_dir }}"
  environment:
    DB_HOST: "{{ db_host }}"
    DB_NAME: "{{ db_name }}"
    DB_USER: "{{ db_user }}"
    DB_PASSWORD: "{{ db_password }}"
  register: import_result
  changed_when: "'Successfully imported' in import_result.stdout"

- name: Show import results
  debug:
    msg: "{{ import_result.stdout_lines | default(['No output']) }}"

